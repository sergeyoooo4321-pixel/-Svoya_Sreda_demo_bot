name: Deploy to server

# Автодеплой при каждом пуше в main: SSH на сервер → git pull → обновить зависимости → перезапуск сервисов.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/svoya_bot
            echo "Текущий коммит до pull: $(git rev-parse --short HEAD)"
            git fetch --all --prune
            git reset --hard origin/main
            echo "Коммит после: $(git rev-parse --short HEAD)"
            .venv/bin/python -m pip install -q -r requirements.txt
            systemctl restart svoya-bot svoya-web
            sleep 4
            echo "bot: $(systemctl is-active svoya-bot) | web: $(systemctl is-active svoya-web)"
